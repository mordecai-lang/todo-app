name: CI/CD Pipeline
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/todo-app:latest .

    - name: Push image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/todo-app:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.VM_IP }}
        username: ${{ secrets.VM_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          mkdir -p ~/todo-app
          cd ~/todo-app

          curl -O https://raw.githubusercontent.com/YOUR_USERNAME/todo-app/main/docker-compose.yml

          docker-compose pull
          docker-compose up -d --remove-orphans
          echo "http://${{ secrets.VM_IP }}:5000"
